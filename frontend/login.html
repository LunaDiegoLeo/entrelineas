<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entre Líneas | Acceso Autores</title>
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&family=Permanent+Marker&family=Space+Grotesk:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="icon" href="assets/images/poco2.webp" type="image/webp">

</head>
<body style="display: flex; justify-content: center; align-items: center; min-height: 100vh; background-color: #f4f4f4;">

    <div class="cutout-box" style="width: 100%; max-width: 400px; padding: 30px;">
        <h2 class="marker-text" style="text-align: center; margin-bottom: 20px;">Acceso de Autores</h2>
        
        <form id="loginForm">
            <div style="margin-bottom: 15px;">
                <label for="usuario" style="font-family: 'Space Grotesk', sans-serif; font-weight: bold;">Usuario:</label>
                <input type="text" id="usuario" required style="width: 100%; padding: 10px; margin-top: 5px; border: 2px solid #000;">
            </div>

            <div style="margin-bottom: 20px;">
                <label for="password" style="font-family: 'Space Grotesk', sans-serif; font-weight: bold;">Contraseña:</label>
                <input type="password" id="password" required style="width: 100%; padding: 10px; margin-top: 5px; border: 2px solid #000;">
            </div>

            <div id="error-msg" style="color: red; font-family: 'Courier Prime', monospace; margin-bottom: 15px; display: none;"></div>

            <button type="submit" class="btn btn-purple" style="width: 100%; text-align: center;">Iniciar Sesión</button>
        </form>
    </div>

    <script src="assets/js/login.js"></script>
</body>
</html>
