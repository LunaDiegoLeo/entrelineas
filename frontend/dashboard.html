<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entre Líneas | Panel de Autores</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&family=Permanent+Marker&family=Space+Grotesk:wght@300;400;500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="icon" href="assets/images/poco2.PNG" type="image/png">
    <script>
        if (!localStorage.getItem("entrelineas_token")) {
            window.location.replace("login.html");
        }
    </script>
</head>

<body style="background-color: #f4f4f4; padding: 20px;">

    <nav class="navbar" style="margin-bottom: 40px;">
        <div class="nav-logo marker-text">
            <a href="index.html" style="text-decoration: none; color: inherit;">ENTRE LÍNEAS</a>
        </div>
        <div class="nav-links">
            <button id="logoutBtn" class="btn btn-green" style="padding: 5px 15px; font-size: 0.9rem; cursor: pointer;">
                Cerrar Sesión
            </button>
        </div>
    </nav>

    <main style="max-width: 800px; margin: 0 auto; margin-top: 100px;">
        <div class="cutout-box" style="padding: 40px; text-align: center;">
            <div class="tape tape-top"></div>

            <h1 class="marker-text" style="font-size: 2.5rem; margin-bottom: 15px;">
                ¡Bienvenido, Autor!
            </h1>

            <p style="font-family: 'Space Grotesk', sans-serif; font-size: 1.2rem; color: #333; margin-bottom: 30px;">
                Este es tu panel privado desde donde podrás gestionar y publicar tus columnas.
            </p>
            <div style="margin-top: 30px; text-align: center;">
                <a href="crear.html" class="btn btn-green" style="font-size: 1.2rem; padding: 15px 30px;">
                    + Escribir Nueva Columna
                </a>
            </div>


        </div>
    </main>

    <script src="assets/js/dashboard.js"></script>
</body>

</html>
