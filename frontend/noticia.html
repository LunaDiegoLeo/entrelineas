<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entre Líneas | Noticia</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?
family=Courier+Prime:wght@400;700&family=Permanent+Marker&family=Space+Grotesk:wght@300;400;500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="icon" href="assets/images/poco2.PNG" type="image/png">

</head>


<body>
    <nav class="navbar">
        <div class="nav-logo marker-text"><a href="index.html" style="text-decoration: none; color: inherit;">ENTRE LÍNEAS</a></div>
        <div class="nav-links">
            <a href="#">Inicio</a>
            <a href="#">Noticias</a>
            <a href="#">Tecnología</a>
            <a href="#">Cultura</a>
            <a href="#">Opinión</a>
        </div>
    </nav>
    <header class="article-hero cutout-box">
        <div class="tape tape-top"></div>
        <span id="categoria" class="category-tag"></span>
        <h1 id="titulo" class="article-title marker-text">
        </h1>
        <p id="resumen" class="article-subtitle">
        </p>
        <div class="article-meta">
            <div class="author-info">
                <img id="autor-foto" src="" alt="Autor">
                <div>
                    <h4 id="autor-nombre"></h4>
                    <span><b>Publicado el:</b></span><span id="fecha"></span>
                </div>
            </div>
        </div>
    </header>
    <main class="article-layout">
        <aside class="sidebar">
            <div class="sidebar-box">
                <h3 class="marker-text">Trending</h3>
                <ul id="trending-list"></ul>
            </div>
        </aside>
        <article id="contenido" class="article-content cutout-box">
            <img id="portada" class="cover-image" src="">
        </article>
    </main>
    <footer class="footer cutout-box">
        <h2 class="marker-text">Entre Líneas</h2>
        <p>
            Periodismo digital, cultura y tecnología.
        </p>
      
        <div class="copy">
            © 2026 Entre Líneas — Todos los derechos reservados.
        </div>
    </footer>
    <script src="assets/js/noticia.js"></script>
</body>

</html>
