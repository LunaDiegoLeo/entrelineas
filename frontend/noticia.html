        rel="stylesheet">

    <link rel="icon" href="assets/images/poco2.webp" type="image/webp">

<style>
    .author-info {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
    }

    #autor-foto {
        width: clamp(100px, 10vw, 150px);
        height: clamp(100px, 10vw, 150px);

        object-fit: cover;
        border-radius: 50%;
        flex-shrink: 0;
        border: 2px solid #222;
        box-shadow: 2px 2px 0px rgba(0, 0, 0, 0.2);
    }

    .author-info div {
        display: flex;
        flex-direction: column;
    }

    #autor-nombre {
        margin: 0;
        font-size: 1.1rem;
        font-weight: bold;
    }

    .date {
        font-size: 0.9rem;
        color: #555;
    }
</style>


<body>
    <nav class="navbar">

        <div class="nav-logo marker-text"><a href="index.html" style="text-decoration: none; color: inherit;">ENTRE
                LÍNEAS</a></div>
        <div class="nav-links">
            <a href="busqueda.html">Buscar</a>
        </div>

        <button id="btn-theme"
            style="cursor: pointer; font-size: 1.5rem; background: none; border: none; color: inherit;" aria-label="Cambiar tema oscuro o claro">
            <i class="fa-solid fa-moon"></i>
        </button>
    </nav>
    <header class="article-hero cutout-box">
        <div class="tape tape-top"></div>
        <span id="categoria" class="category-tag"></span><br>
        <br>
        <h1 id="titulo" class="article-title marker-text">
        </h1>
        <br>
        <center>
            <div class="article-meta">
                <div class="author-info">
                    <img id="autor-foto" src="" alt="Autor">
                    <div>
                        <h4 id="autor-nombre"></h4>
                        <span id="fecha"></span>
                    </div>
                </div>
            </div>
        </center>
        <br>
        <p id="resumen" class="article-subtitle" style="font-family: 'Monserrat', sans-serif;">
        </p>
    </header>
    <main class="article-layout">
        <aside class="sidebar">
            <div class="sidebar-box">
                <h3 class="marker-text">Trending</h3>
                <ul id="trending-list"></ul>
            </div>
        </aside>
        <article id="contenido" class="article-content cutout-box" style="font-family: 'Monserrat', sans-serif;">
            <img id="portada" class="cover-image" src="">
        </article>
    </main>
    <footer class="footer cutout-box" id="footer">
        <h2 class="marker-text">Entre Líneas</h2>
        <p>
            Periodismo digital, cultura y tecnología.
        </p>

        <div class="copy">
            © 2026 Entre Líneas — Todos los derechos reservados.
        </div>
    </footer>
    <script src="assets/js/noticia.js"></script>
