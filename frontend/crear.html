<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entre Líneas | Creador de Columnas</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&family=Permanent+Marker&family=Space+Grotesk:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="icon" href="assets/images/poco2.webp" type="image/webp">
    <script>
        if (!localStorage.getItem("entrelineas_token")) window.location.replace("login.html");
    </script>
    <style>
        .editor-container { display: flex; height: 100vh; overflow: hidden; }
        .editor-panel { width: 50%; padding: 20px; overflow-y: auto; background: #f4f4f4; border-right: 3px solid #000; }
        .preview-panel { width: 50%; overflow-y: auto; background: #fff; padding: 20px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { font-family: 'Space Grotesk', sans-serif; font-weight: bold; display: block; }
        .form-group input[type="text"], .form-group textarea, .form-group select, .form-group input[type="file"] { width: 100%; padding: 10px; border: 2px solid #000; margin-top: 5px; font-family: 'Courier Prime', monospace; background: #fff; }
        .block-card { background: white; border: 2px dashed #666; padding: 15px; margin-bottom: 10px; position: relative; }
        .block-card button.delete-btn { position: absolute; top: 5px; right: 5px; background: red; color: white; border: none; cursor: pointer; font-weight: bold; }
        .toolbar-btn { cursor: pointer; padding: 5px 10px; border: 2px solid #000; background: #c8a2c8; font-weight: bold; margin-right: 5px; margin-bottom: 5px; display: inline-block; }
        .format-bar { background: #e0e0e0; padding: 5px; border: 2px dashed #666; border-bottom: none; display: flex; gap: 5px; border-radius: 5px 5px 0 0; }
        .format-btn { background: white; border: 2px solid #000; cursor: pointer; font-weight: bold; padding: 2px 8px; font-family: 'Space Grotesk', sans-serif; font-size: 0.9rem; transition: 0.2s; }
        .format-btn:hover { background: #c8a2c8; color: white; transform: scale(1.05); }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 2000; backdrop-filter: blur(3px); }
        .modal-content { background: #fff; padding: 25px; width: 90%; max-width: 400px; border: 3px solid #000; box-shadow: 8px 8px 0px #000; border-radius: 10px; }
    </style>
</head>
<body>
    <div class="editor-container">
        <!-- LADO IZQUIERDO -->
        <div class="editor-panel">
            <h2 class="marker-text" style="margin-bottom: 20px;">Redacción</h2>
            
            <div class="cutout-box" style="padding: 20px; margin-bottom: 20px;">
                <div class="form-group">
                    <label>Título:</label>
                    <input type="text" id="input-titulo" placeholder="Ej. La fotografía como acto político">
                </div>
                <div class="form-group">
                    <label>Resumen:</label>
                    <textarea id="input-resumen" rows="3" placeholder="Un breve adelanto..."></textarea>
                </div>
                <div class="form-group">
                    <label>Foto de Portada:</label>
                    <input type="file" id="input-portada" accept="image/*">
                </div>
                <div style="display: flex; gap: 10px;">
                    <div class="form-group" style="flex: 1;">
                        <label>Autor:</label>
                        <!-- Se llenará vía API -->
                        <select id="input-autor"></select>
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label>Categoría:</label>
                        <!-- Se llenará vía API -->
                        <select id="input-categoria"></select>
                    </div>
                </div>
            </div>

            <h3 class="marker-text" style="font-size: 1.5rem; margin-bottom: 10px;">Contenido</h3>
            <div style="margin-bottom: 15px;">
                <button class="toolbar-btn" onclick="agregarBloque('parrafo')">+ Párrafo</button>
                <button class="toolbar-btn" onclick="agregarBloque('subtitulo')">+ Subtítulo</button>
                <button class="toolbar-btn" onclick="agregarBloque('imagen')">+ Imagen</button>
                <button class="toolbar-btn" onclick="agregarBloque('cita')">+ Blockquote</button>
                <button class="toolbar-btn" style="background:#a2c8a2;" onclick="agregarBloque('tarjeta-estilo')">+ Tarjeta (Gris)</button>
                <button class="toolbar-btn" style="background:#a2c8a2;" onclick="agregarBloque('tarjeta-simple')">+ Tarjeta (Simple)</button>
            </div>

            <div id="bloques-container"></div>

            <div style="margin-top: 30px; border-top: 2px solid #000; padding-top: 20px;">
                <button class="btn btn-green" style="width: 100%; margin-bottom: 10px;" onclick="publicarNoticia()">Publicar Columna</button>
            </div>
            <br><a href="dashboard.html" style="color: red; text-decoration: none; font-weight: bold;">← Cancelar y salir</a>
        </div>

        <!-- LADO DERECHO: VISTA PREVIA -->
        <div class="preview-panel">
            <header class="article-hero cutout-box">
                <span id="preview-categoria" class="category-tag">...</span>
                <h1 id="preview-titulo" class="article-title marker-text">Título...</h1>
                <p id="preview-resumen" class="article-subtitle">Resumen...</p>
                <div class="article-meta">
                    <div class="author-info">
                        <div>
                            <h4>Por: <span id="preview-autor">...</span></h4>
                            <span><b>Publicado el:</b> <span id="preview-fecha">Hoy</span></span>
                        </div>
                    </div>
                </div>
            </header>
            
            <main class="article-layout" style="display: block;">
                <article class="article-content cutout-box">
                    <img id="preview-portada" class="cover-image" src="" alt="Portada" style="display: none;">
                    <div id="preview-contenido"></div>
                </article>
            </main>
        </div>
    </div>
    <script src="assets/js/crear.js"></script>
    <div id="formato-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <h3 class="marker-text" id="modal-titulo" style="margin-bottom: 15px;">Insertar ✨</h3>
            
            <div class="form-group">
                <label>Texto a resaltar:</label>
                <input type="text" id="modal-texto" placeholder="Ej. Y la queso...">
            </div>
            
            <div class="form-group" id="modal-url-group" style="display: none;">
                <label>URL del Enlace 🔗:</label>
                <input type="text" id="modal-url" placeholder="https://...">
            </div>
            
            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button class="btn btn-green" style="flex: 1;" onclick="inyectarFormato()">Aceptar</button>
                <button class="btn" style="flex: 1; background: #ff4d4d; color: white;" onclick="cerrarModal()">Cancelar</button>
            </div>
        </div>
    </div>
</body>
</html>
